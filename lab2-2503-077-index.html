<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href=".vscode/lab2-2503-077-index.css">
</head>
<body>
    <!-- 头部区域 logo+导航 -->
    <header class="header">
        <div class="logo">图书商城LOGO</div>
        <!-- 顶部导航 固定+浮动 -->
        <nav class="top-nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热销榜单</a></li>
                <li><a href="#">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 主体三栏浮动 -->
    <div class="container">
        <!-- 左侧栏 相对定位 -->
        <aside class="left-bar">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>计算机科技</li>
                <li>经管励志</li>
                <li>历史人文</li>
                <li>教辅资料</li>
            </ul>
        </aside>

        <!-- 中间内容区 -->
        <main class="main-content">
            <h3>图书展示</h3>
            <!-- 父相子绝 悬浮隐藏显示 -->
            <div class="book-list">
                <div class="book-item">
                    <img src="./img/book1.jpg" alt="图书">
                    <div class="mask">点击查看详情</div>
                </div>
                <div class="book-item">
                    <img src="./img/book2.jpg" alt="图书">
                </div>
                <div class="book-item">
                    <img src="./img/book3.jpg" alt="图书">
                </div>
            </div>

            <!-- 热门推荐 浮动排列 -->
            <div class="hot-book">
                <h3>热门推荐</h3>
                <div class="hot-item">热门图书1</div>
                <div class="hot-item">热门图书2</div>
                <div class="hot-item">热门图书3</div>
            </div>

            <!-- 新书上市 table布局 -->
            <div class="new-book">
                <h3>新书上市</h3>
                <table border="1" cellpadding="8" cellspacing="0">
                    <tr>
                        <td>书名</td>
                        <td>作者</td>
                        <td>价格</td>
                    </tr>
                    <tr>
                        <td>前端开发入门</td>
                        <td>张三</td>
                        <td>¥49.9</td>
                    </tr>
                    <tr>
                        <td>计算机网络</td>
                        <td>李四</td>
                        <td>¥39.9</td>
                    </tr>
                </table>
            </div>
        </main>

        <!-- 右侧栏 固定定位 广告 -->
        <aside class="right-bar">
            <h3>促销活动</h3>
            <p>全场图书8折</p>
            <p>满99减20</p>
            <p>会员专属优惠</p>
        </aside>
    </div>
</body>
</html>
